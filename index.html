<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceSlicer</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1>VoiceSlicer</h1>
            <p>WAV/MP3ファイルをブラウザ上で簡単にスライスしてダウンロード</p>
        </header>

        <main class="main-content">
            <!-- アップロードエリア -->
            <section id="upload-section" class="card drop-zone">
                <div class="drop-zone-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h2>ファイルを選択するか、ドラッグ＆ドロップしてください</h2>
                    <p>対応フォーマット: .wav, .mp3</p>
                    <input type="file" id="file-input" accept=".wav,.mp3" hidden>
                    <button id="btn-browse" class="btn btn-primary">ファイルを選択</button>
                </div>
            </section>

            <!-- ワークスペース (ファイルアップロード後に表示) -->
            <section id="workspace" class="card hidden">
                <div class="workspace-header">
                    <h2 id="file-name-display">ファイル名未設定</h2>
                    <div class="time-display">
                        <span id="current-time">00:00.000</span> / <span id="total-time">00:00.000</span>
                    </div>
                </div>

                <!-- 波形表示エリア -->
                <div class="waveform-container" id="waveform-container">
                    <div id="waveform"></div>
                    <div id="time-tooltip" class="hidden">0.000s</div>
                    <!-- 波形ロード中のオーバーレイ -->
                    <div id="waveform-loading" class="overlay hidden">
                        <div class="spinner"></div>
                        <p>音声を解析中...</p>
                    </div>
                </div>

                <!-- コントロールパネル -->
                <div class="controls-panel">
                    <div class="controls-group playback-controls">
                        <button id="btn-play-pause" class="btn btn-icon" title="再生/一時停止 (Space)">
                            <svg class="icon-play" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                            <svg class="icon-pause hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="4" width="4" height="16"></rect>
                                <rect x="14" y="4" width="4" height="16"></rect>
                            </svg>
                        </button>
                    </div>

                    <div class="controls-group action-controls">
                        <button id="btn-split" class="btn btn-secondary" title="現在位置で区切る (Enter)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="6" cy="6" r="3"></circle>
                                <circle cx="6" cy="18" r="3"></circle>
                                <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
                                <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
                                <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
                            </svg>
                            区切る
                        </button>
                    </div>

                    <div class="controls-group export-controls">
                        <div class="format-selector">
                            <label for="export-format">出力形式:</label>
                            <select id="export-format" class="select-input">
                                <option value="wav">WAV</option>
                                <option value="mp3">MP3</option>
                            </select>
                        </div>
                        <button id="btn-download-all" class="btn btn-primary" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            一括ダウンロード
                        </button>
                    </div>
                </div>

                <!-- 処理中のオーバーレイ -->
                <div id="processing-overlay" class="overlay hidden">
                    <div class="processing-content">
                        <div class="spinner"></div>
                        <p id="processing-status">処理中...</p>
                        <div class="progress-bar">
                            <div id="processing-progress" class="progress-fill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- リージョン（区切り）リスト -->
            <section id="regions-section" class="card hidden">
                <div class="section-header">
                    <h2>区切りリスト</h2>
                    <p class="help-text">※除外したい区間は波形上で右クリックするか、リストのトグルで切り替えられます</p>
                </div>

                <div class="list-actions" style="margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center;">
                    <label for="input-split-time" style="font-size: 0.875rem; font-weight: 500;">時刻指定追加:</label>
                    <input type="number" id="input-split-time" class="number-input"
                        style="width: 120px; padding: 0.5rem; border: 1px solid var(--clr-border, #ccc); border-radius: 4px;"
                        min="0" step="0.001" placeholder="0.000">
                    <button id="btn-add-split" class="btn btn-secondary" style="padding: 0.4rem 1rem;">追加・挿入</button>
                </div>

                <div class="table-container">
                    <table class="regions-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>開始時間 (sec)</th>
                                <th>終了時間 (sec)</th>
                                <th>長さ (sec)</th>
                                <th>状態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="regions-list">
                            <!-- JSで動的に追加されます -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- ライブラリの読み込み -->
    <!-- lamejs for mp3 encoding -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <!-- JSZip for zip compression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- アプリケーションのスクリプト -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
